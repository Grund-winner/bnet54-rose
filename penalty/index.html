<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Penalty Shootout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        html, body {
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
        }

        /* Block zoom */
        body {
            -ms-content-zooming: none;
        }

        .game-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 0 16px;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== PROGRESS BAR ===== */
        .progress-bar {
            width: 100%;
            margin-bottom: 10px;
        }

        .progress-track {
            width: 100%;
            height: 22px;
            background: transparent;
            border-radius: 22px;
            border: 2px solid rgba(255,255,255,0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .progress-fill {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #30d158, #34c759);
            border-radius: 22px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        .progress-dot {
            position: relative;
            z-index: 1;
            width: 16px;
            height: 16px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            transition: all 0.4s ease;
            flex-shrink: 0;
        }

        .progress-dot:first-child { margin-left: 4px; }
        .progress-dot:last-child { margin-right: 4px; }

        .progress-dot.active {
            background: #fff;
            box-shadow: 0 0 8px rgba(255,255,255,0.6);
            transform: scale(1.15);
        }

        /* ===== GOAL ===== */
        .goal-outer {
            width: 100%;
            max-width: 420px;
            position: relative;
        }

        .goal-container {
            width: 100%;
            position: relative;
            background: url('varana.png') no-repeat center center;
            background-size: contain;
            /* Aspect ratio matches varana.png (703x355) */
            aspect-ratio: 703 / 355;
        }

        /* Ball grid constrained INSIDE the goal frame */
        .ball-grid {
            position: absolute;
            top: 12%;
            left: 10%;
            right: 10%;
            bottom: 18%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 1fr);
            place-items: center;
        }

        .circle {
            width: 85%;
            aspect-ratio: 1;
            background-image: url('ball.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: opacity 0.3s ease;
        }

        .circle.hidden { opacity: 0; }

        .pulsating {
            background-image: url('ballred.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: pulse 1s infinite;
        }

        .replaced {
            background-image: url('football.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transform: scale(0);
            animation: appear 0.5s forwards ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @keyframes appear {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1.1); opacity: 1; }
        }

        /* ===== BUTTONS ===== */
        .btn-predict {
            width: 50%;
            margin-top: 14px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            background: linear-gradient(135deg, #30d158, #28a745);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(52, 199, 89, 0.35);
        }

        .btn-predict:active {
            transform: scale(0.97);
            box-shadow: 0 2px 6px rgba(52, 199, 89, 0.25);
        }

        .btn-back {
            width: 33.33%;
            margin-top: 10px;
            padding: 14px 10px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            color: #fff;
            background: linear-gradient(135deg, #ff3b30, #d63028);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(255, 59, 48, 0.3);
        }

        .btn-back:active {
            transform: scale(0.97);
            box-shadow: 0 2px 6px rgba(255, 59, 48, 0.2);
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: rgba(30,30,30,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: #fff;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            z-index: 100;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 380px) {
            .game-wrapper { padding: 0 10px; }
            .btn-predict { padding: 12px 16px; font-size: 15px; }
            .btn-back { padding: 12px 8px; font-size: 13px; }
        }

        @media (max-height: 640px) {
            .progress-bar { margin-bottom: 6px; }
            .progress-track { height: 18px; padding: 0 12px; }
            .progress-dot { width: 12px; height: 12px; }
            .btn-predict { margin-top: 8px; padding: 11px 14px; font-size: 14px; }
            .btn-back { margin-top: 6px; padding: 11px 8px; font-size: 13px; }
        }

        @media (max-height: 560px) {
            .progress-bar { margin-bottom: 4px; }
            .progress-track { height: 14px; }
            .progress-dot { width: 10px; height: 10px; }
            .btn-predict { margin-top: 6px; padding: 10px; font-size: 13px; }
            .btn-back { margin-top: 5px; padding: 10px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="progress-bar">
            <div class="progress-track">
                <div class="progress-fill" id="fill"></div>
                <div class="progress-dot" id="dot-0"></div>
                <div class="progress-dot" id="dot-1"></div>
                <div class="progress-dot" id="dot-2"></div>
                <div class="progress-dot" id="dot-3"></div>
                <div class="progress-dot" id="dot-4"></div>
            </div>
        </div>

        <div class="goal-outer">
            <div class="goal-container">
                <div class="ball-grid">
                    <div class="circle"></div><div class="circle"></div><div class="circle"></div>
                    <div class="circle"></div><div class="circle"></div><div class="circle"></div>
                    <div class="circle"></div><div class="circle"></div><div class="circle"></div>
                    <div class="circle"></div><div class="circle"></div><div class="circle"></div>
                    <div class="circle"></div><div class="circle"></div><div class="circle"></div>
                </div>
            </div>
        </div>

        <button class="btn-predict" id="btn-predict">Prédire</button>

        <button class="btn-back" onclick="history.back()">← Retour</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let pulseCount = 0;

        document.getElementById('btn-predict').addEventListener('click', function() {
            var circles = document.querySelectorAll('.circle');
            var available = [];
            for (var i = 0; i < circles.length; i++) {
                var c = circles[i];
                if (!c.classList.contains('hidden') && !c.classList.contains('replaced')) {
                    available.push(c);
                }
            }

            if (pulseCount < 5 && available.length > 0) {
                var chosen = available[Math.floor(Math.random() * available.length)];

                chosen.classList.add('hidden');

                setTimeout(function() {
                    chosen.classList.remove('hidden');
                    chosen.classList.add('pulsating');

                    setTimeout(function() {
                        chosen.classList.remove('pulsating');
                        chosen.classList.add('replaced');

                        document.getElementById('dot-' + pulseCount).classList.add('active');
                        document.getElementById('fill').style.width = (pulseCount + 1) * 20 + '%';
                        pulseCount++;

                        if (pulseCount >= 5) {
                            showToast('5 / 5 terminé !');
                        }
                    }, 2500);
                }, 300);

            } else if (pulseCount >= 5) {
                for (var i = 0; i < circles.length; i++) {
                    circles[i].classList.remove('hidden', 'pulsating', 'replaced');
                }
                for (var i = 0; i < 5; i++) {
                    document.getElementById('dot-' + i).classList.remove('active');
                }
                document.getElementById('fill').style.width = '0%';
                pulseCount = 0;
                showToast('Nouvelle partie !');
            }
        });

        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 2000);
        }

        // Block zoom
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
        document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
        document.addEventListener('gestureend', function(e) { e.preventDefault(); });
        var lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            var now = Date.now();
            if (now - lastTouchEnd <= 300) { e.preventDefault(); }
            lastTouchEnd = now;
        }, { passive: false });
    </script>

</body>
</html>
