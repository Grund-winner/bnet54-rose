<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="theme-color" content="#050d14">
    <title>BNET54 - Labu Run</title>
    <link rel="icon" href="assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="laburun.css">
</head>
<body>
    <div class="game-wrapper">
        <!-- Game background directly visible -->
        <div class="game-bg"></div>

        <!-- Floating particles -->
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>

        <div class="game-container">
            <!-- Logo -->
            <div class="logo-container">
                <img src="assets/laburun/game-logo.webp" alt="Labu Run" class="logo" onerror="this.style.display='none'">
            </div>

            <!-- Game Mode Selector -->
            <div class="game-mode-selector">
                <div class="mode-title">Choose Difficulty</div>
                <div class="mode-buttons">
                    <button class="mode-btn active" data-mode="easy">Easy</button>
                    <button class="mode-btn" data-mode="medium">Medium</button>
                    <button class="mode-btn" data-mode="hard">Hard</button>
                    <button class="mode-btn" data-mode="hardcore">Hardcore</button>
                </div>
            </div>

            <!-- Game Area - directly on the background -->
            <div class="game-area">
                <!-- Sparkle effects -->
                <div class="sparkle s1"></div>
                <div class="sparkle s2"></div>
                <div class="sparkle s3"></div>
                <div class="sparkle s4"></div>
                <div class="sparkle s5"></div>
                <div class="sparkle s6"></div>

                <!-- Rabbit Character -->
                <div class="labu" id="labu">
                    <img src="assets/laburun/labu_standing.png" alt="Labu" id="labu-img">
                </div>

                <!-- Coefficient Display (hidden initially) -->
                <div class="coefficient-display" id="coefficientDisplay">
                    <div class="coefficient-glow"></div>
                    <div class="coefficient-text" id="coefficientText">0.00x</div>
                </div>
            </div>

            <!-- Predict Button -->
            <div class="signal-button-container">
                <button class="get-signal-btn" id="getSignalBtn">PREDICT</button>
            </div>

            <!-- Back Button -->
            <div class="bottom-buttons-container">
                <button class="back-btn" id="backBtn">
                    <div class="back-icon">&larr;</div>
                    <span class="back-text">Back</span>
                </button>
            </div>
        </div>
    </div>

    <script src="laburun.js"></script>
</body>
</html>
