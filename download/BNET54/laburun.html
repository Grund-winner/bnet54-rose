<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#060a20" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>BNET54 - Labu Run</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="laburun.css" />
</head>
<body>
  <div class="pred-ambient"></div>
  <header class="pred-header">
    <div class="pred-header-left"><span class="pred-logo">BNET54</span><span class="pred-header-sub">Predictions</span></div>
    <div class="pred-header-right"><span class="pred-status-dot" id="statusDot"></span><span class="pred-status-text" id="statusText">Pret</span></div>
  </header>

  <main class="pred-content">
    <h1 class="pred-game-title">Labu Run</h1>

    <!-- Mode Selector -->
    <div class="labu-mode-selector">
      <div class="labu-mode-label">Niveau de difficulte</div>
      <div class="labu-mode-buttons">
        <button class="labu-mode-btn active" data-mode="facile">FACILE</button>
        <button class="labu-mode-btn" data-mode="moyen">MOYEN</button>
        <button class="labu-mode-btn" data-mode="difficile">DIFFICILE</button>
        <button class="labu-mode-btn" data-mode="hardcore">HARDCORE</button>
      </div>
    </div>

    <!-- Game Tunnel -->
    <div class="labu-tunnel" id="labuTunnel">
      <!-- Atmospheric glows -->
      <div class="tunnel-glow tg-1"></div>
      <div class="tunnel-glow tg-2"></div>
      <div class="tunnel-glow tg-3"></div>

      <!-- Decorative stars -->
      <div class="tunnel-star ts-1"></div>
      <div class="tunnel-star ts-2"></div>
      <div class="tunnel-star ts-3"></div>
      <div class="tunnel-star ts-4"></div>
      <div class="tunnel-star ts-5"></div>
      <div class="tunnel-star ts-6"></div>

      <!-- Path circles -->
      <div class="labu-circle" id="c0" data-step="0"></div>
      <div class="labu-circle" id="c1" data-step="1"></div>
      <div class="labu-circle" id="c2" data-step="2"></div>
      <div class="labu-circle" id="c3" data-step="3"></div>
      <div class="labu-circle" id="c4" data-step="4"></div>
      <div class="labu-circle" id="c5" data-step="5"></div>
      <div class="labu-circle" id="c6" data-step="6"></div>
      <div class="labu-circle" id="c7" data-step="7"></div>

      <!-- Rabbit -->
      <div class="labu-rabbit" id="labuRabbit">
        <svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" id="rabbitAlive">
          <ellipse cx="40" cy="92" rx="16" ry="3" fill="rgba(0,0,0,0.12)"/>
          <ellipse cx="40" cy="65" rx="17" ry="15" fill="#f8f8f8"/>
          <ellipse cx="40" cy="65" rx="17" ry="15" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>
          <circle cx="56" cy="64" r="5" fill="#f8f8f8"/><circle cx="56" cy="64" r="5" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>
          <circle cx="40" cy="40" r="13" fill="#f8f8f8"/><circle cx="40" cy="40" r="13" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>
          <ellipse cx="32" cy="18" rx="4.5" ry="13" fill="#f8f8f8" transform="rotate(-8 32 18)"/>
          <ellipse cx="32" cy="18" rx="4.5" ry="13" fill="none" stroke="#e8e8e8" stroke-width="0.5" transform="rotate(-8 32 18)"/>
          <ellipse cx="32" cy="17" rx="2.2" ry="9" fill="#ffb6c1" transform="rotate(-8 32 17)"/>
          <ellipse cx="48" cy="18" rx="4.5" ry="13" fill="#f8f8f8" transform="rotate(8 48 18)"/>
          <ellipse cx="48" cy="18" rx="4.5" ry="13" fill="none" stroke="#e8e8e8" stroke-width="0.5" transform="rotate(8 48 18)"/>
          <ellipse cx="48" cy="17" rx="2.2" ry="9" fill="#ffb6c1" transform="rotate(8 48 17)"/>
          <circle cx="35" cy="38" r="2.2" fill="#333"/><circle cx="45" cy="38" r="2.2" fill="#333"/>
          <circle cx="35.8" cy="37.2" r="0.7" fill="white"/><circle cx="45.8" cy="37.2" r="0.7" fill="white"/>
          <ellipse cx="40" cy="43" rx="1.8" ry="1.3" fill="#ff9999"/>
          <circle cx="30" cy="42" r="2.8" fill="rgba(255,182,193,0.22)"/>
          <circle cx="50" cy="42" r="2.8" fill="rgba(255,182,193,0.22)"/>
          <path d="M37 45 Q40 47.5 43 45" stroke="#ddd" fill="none" stroke-width="0.7"/>
          <ellipse cx="34" cy="79" rx="5" ry="3" fill="#f8f8f8"/><ellipse cx="34" cy="79" rx="5" ry="3" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>
          <ellipse cx="46" cy="79" rx="5" ry="3" fill="#f8f8f8"/><ellipse cx="46" cy="79" rx="5" ry="3" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>
        </svg>
        <!-- Dead rabbit (hidden by default) -->
        <svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" id="rabbitDead" style="display:none">
          <ellipse cx="40" cy="92" rx="16" ry="3" fill="rgba(0,0,0,0.12)"/>
          <ellipse cx="40" cy="68" rx="17" ry="15" fill="#f0f0f0"/>
          <ellipse cx="40" cy="68" rx="17" ry="15" fill="none" stroke="#ddd" stroke-width="0.5"/>
          <circle cx="56" cy="67" r="5" fill="#f0f0f0"/><circle cx="56" cy="67" r="5" fill="none" stroke="#ddd" stroke-width="0.5"/>
          <circle cx="40" cy="43" r="13" fill="#f0f0f0"/><circle cx="40" cy="43" r="13" fill="none" stroke="#ddd" stroke-width="0.5"/>
          <ellipse cx="28" cy="24" rx="4.5" ry="11" fill="#f0f0f0" transform="rotate(-25 28 24)"/>
          <ellipse cx="28" cy="24" rx="2.2" ry="7" fill="#ffb6c1" transform="rotate(-25 28 24)"/>
          <ellipse cx="52" cy="24" rx="4.5" ry="11" fill="#f0f0f0" transform="rotate(25 52 24)"/>
          <ellipse cx="52" cy="24" rx="2.2" ry="7" fill="#ffb6c1" transform="rotate(25 52 24)"/>
          <line x1="33" y1="41" x2="37" y2="39" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="37" y1="41" x2="33" y2="39" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="43" y1="41" x2="47" y2="39" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="47" y1="41" x2="43" y2="39" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
          <ellipse cx="40" cy="46" rx="1.8" ry="1.3" fill="#cc8888"/>
          <path d="M38 48 Q40 46 42 48" stroke="#ccc" fill="none" stroke-width="0.7"/>
          <ellipse cx="34" cy="82" rx="5" ry="3" fill="#f0f0f0"/>
          <ellipse cx="46" cy="82" rx="5" ry="3" fill="#f0f0f0"/>
        </svg>
      </div>

      <!-- Multiplier result badge -->
      <div class="labu-result-badge" id="labuResult" style="display:none">
        <span id="resultMult"></span>
      </div>

      <!-- Loading overlay -->
      <div class="labu-loading-overlay" id="labuLoading" style="display:none">
        <div class="labu-spinner"></div>
        <span>Analyse en cours...</span>
      </div>
    </div>

    <!-- PREDIRE Button -->
    <button class="predire-btn" id="predireBtn">PREDIRE</button>

    <!-- Back Button -->
    <a class="pred-back-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      <span>Retour</span>
    </a>
  </main>

  <footer class="pred-footer"><p>BNET54 2025</p></footer>
  <div class="pred-badge">BNET54</div>
  <script src="laburun.js"></script>
</body>
</html>
