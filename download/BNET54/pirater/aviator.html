<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BNET54 - Pirater - Aviator</title>
  <link rel="icon" href="../assets/logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <div class="pir-game-header">
    <div class="pir-game-header-left">
      <a href="index.html" class="pir-back-link">&larr;</a>
      <span class="pir-game-header-brand">BNET54</span>
      <span class="pir-game-header-sub">Pirater</span>
    </div>
    <div class="pir-game-header-skull">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a9 9 0 00-9 9c0 3.07 1.64 5.64 4 7.1V22h10v-3.9c2.36-1.46 4-4.03 4-7.1a9 9 0 00-9-9zm-2.5 11a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm5 0a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm-7 1l-.5 3h7l-.5-3H7.5z"/></svg>
    </div>
  </div>

  <!-- Main -->
  <div class="pir-game-main">
    <div class="pir-game-title">Aviator</div>
    <div class="pir-game-skull-badge">
      <span>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a9 9 0 00-9 9c0 3.07 1.64 5.64 4 7.1V22h10v-3.9c2.36-1.46 4-4.03 4-7.1a9 9 0 00-9-9zm-2.5 11a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm5 0a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm-7 1l-.5 3h7l-.5-3H7.5z"/></svg>
        Pirater - Gros Coefficients
      </span>
    </div>

    <!-- Game Area -->
    <div class="pir-game-area">
      <div class="pir-game-area-bg" style="background-image: url('../assets/games/aviator_bg.png');"></div>
    </div>

    <!-- Loading bar -->
    <div class="pir-loader-wrap">
      <div class="pir-loader">
        <div class="pir-loader-bar" id="pirLoaderBar"></div>
      </div>
    </div>

    <!-- Prediction Card -->
    <div class="pir-prediction">
      <div class="pir-prediction-label">Signal Pirat&eacute;</div>
      <div class="pir-prediction-value" id="pirCoeff">---</div>
    </div>

    <!-- Stats -->
    <div class="pir-stats">
      <div class="pir-stat-row">
        <span class="pir-stat-label">Heure :</span>
        <span class="pir-stat-value time" id="pirTime">--:--:-- - --:--:--</span>
      </div>
      <div class="pir-stat-row">
        <span class="pir-stat-label">Chance :</span>
        <span class="pir-stat-value chance" id="pirChance">--%</span>
      </div>
      <div class="pir-stat-row">
        <span class="pir-stat-label">Avant le signal :</span>
        <span class="pir-stat-value countdown" id="pirCountdown">--:--</span>
      </div>
    </div>

    <!-- Buttons -->
    <button class="pir-btn-signal" id="pirSignalBtn">OBTENIR LE SIGNAL</button>
    <a class="pir-btn-back" href="index.html">&larr; Retour</a>

    <div class="pir-game-footer">BNET54 &copy; 2025</div>
  </div>

  <!-- Floating badge -->
  <div class="pir-badge-float">BNET54</div>

  <script>
    pirGame = { name: 'aviator' };
  </script>
  <script src="pirate.js"></script>
</body>
</html>
