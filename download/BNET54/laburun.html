<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0b1a3a">
  <title>BNET54 - Labu Run</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="laburun.css">
</head>
<body>
  <div class="game-bg"></div>

  <!-- Atmospheric decorations -->
  <div class="atmo-glow ag-1"></div>
  <div class="atmo-glow ag-2"></div>
  <div class="atmo-glow ag-3"></div>

  <div class="game-container">
    <!-- Logo -->
    <div class="game-logo-wrap">
      <img src="assets/laburun/logo.png" alt="Labu Run" class="game-logo" id="gameLogo">
    </div>

    <!-- Mode Selector -->
    <div class="mode-selector">
      <button class="mode-btn active" data-mode="facile">FACILE</button>
      <button class="mode-btn" data-mode="moyen">MOYEN</button>
      <button class="mode-btn" data-mode="difficile">DIFFICILE</button>
      <button class="mode-btn" data-mode="hardcore">HARDCORE</button>
    </div>

    <!-- Game Area -->
    <div class="game-area" id="gameArea">
      <!-- Platforms -->
      <div class="platforms-container" id="platformsContainer">
        <div class="platform-row" id="row0" data-row="0">
          <div class="platform" data-idx="0"></div>
        </div>
        <div class="platform-row" id="row1" data-row="1">
          <div class="platform" data-idx="1"></div>
        </div>
        <div class="platform-row" id="row2" data-row="2">
          <div class="platform" data-idx="2"></div>
        </div>
        <div class="platform-row" id="row3" data-row="3">
          <div class="platform" data-idx="3"></div>
        </div>
        <div class="platform-row" id="row4" data-row="4">
          <div class="platform" data-idx="4"></div>
        </div>
        <div class="platform-row" id="row5" data-row="5">
          <div class="platform" data-idx="5"></div>
        </div>
        <div class="platform-row" id="row6" data-row="6">
          <div class="platform" data-idx="6"></div>
        </div>
        <div class="platform-row" id="row7" data-row="7">
          <div class="platform" data-idx="7"></div>
        </div>
      </div>

      <!-- Character -->
      <div class="character" id="character">
        <div class="char-part char-body">
          <img src="assets/laburun/Body.png" alt="" draggable="false">
        </div>
        <div class="char-part char-head" id="charHead">
          <img src="assets/laburun/Head_01.png" alt="" draggable="false">
        </div>
        <div class="char-part char-ear-l">
          <img src="assets/laburun/Ear_L.png" alt="" draggable="false">
        </div>
        <div class="char-part char-ear-r">
          <img src="assets/laburun/Ear_R.png" alt="" draggable="false">
        </div>
        <div class="char-part char-arm-l">
          <img src="assets/laburun/Arm_L.png" alt="" draggable="false">
        </div>
        <div class="char-part char-arm-r">
          <img src="assets/laburun/Arm_R.png" alt="" draggable="false">
        </div>
        <div class="char-part char-leg-l">
          <img src="assets/laburun/legl1.png" alt="" draggable="false">
        </div>
        <div class="char-part char-leg-r">
          <img src="assets/laburun/Leg_R.png" alt="" draggable="false">
        </div>
        <div class="char-part char-hand-l">
          <img src="assets/laburun/Hand_L.png" alt="" draggable="false">
        </div>
        <div class="char-part char-hand-r">
          <img src="assets/laburun/Hand_R.png" alt="" draggable="false">
        </div>
      </div>

      <!-- Crash overlay -->
      <div class="crash-overlay" id="crashOverlay" style="display:none">
        <img class="crash-frame" id="crashFrame" src="" alt="">
      </div>

      <!-- Multiplier result -->
      <div class="multiplier-display" id="multDisplay" style="display:none">
        <span id="multValue"></span>
      </div>

      <!-- Loading state -->
      <div class="loading-overlay" id="loadingOverlay" style="display:none">
        <div class="loading-spinner"></div>
        <span>Analyse en cours...</span>
      </div>
    </div>

    <!-- PREDIRE Button -->
    <button class="predire-btn" id="predireBtn">PREDIRE</button>

    <!-- Back Button -->
    <button class="back-btn" id="backBtn">
      <span class="back-arrow">&#8592;</span>
      <span class="back-text">Retour</span>
    </button>
  </div>

  <script src="laburun.js"></script>
</body>
</html>
