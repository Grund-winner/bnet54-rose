<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0a0a1a">
  <title>BNET54 - Pirater - JetX</title>
  <link rel="icon" href="../assets/logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pir-pred-ambient"></div>
  <header class="pir-pred-header">
    <div class="pir-pred-header-left">
      <span class="pir-pred-logo">BNET54</span>
      <span class="pir-pred-header-sub">Pirater</span>
    </div>
    <div class="pir-pred-header-right">
      <span class="pir-pred-status-dot" id="statusDot"></span>
      <span class="pir-pred-status-text" id="statusText">Pret</span>
    </div>
  </header>
  <main class="pir-pred-content">
    <h1 class="pir-pred-game-title">JetX</h1>
    <div class="pir-range"><span>Plage : 10x - 25x</span></div>
    <div class="pir-game-section">
      <canvas class="pir-canvas" id="crashCanvas"></canvas>
      <div class="pir-viewport">
        <img src="../assets/games/jetx_bg.png" alt="JetX" class="pir-viewport-bg" />
        <div class="pir-viewport-overlay"></div>
        <div class="pir-viewport-gradient"></div>
        <div class="pir-mult-overlay">
          <span class="pir-mult-signal-label" id="multSignalLabel" style="display:none;">SIGNAL ACTIF</span>
          <span class="pir-mult-value" id="multValue">--</span>
          <span class="pir-mult-state" id="multState">En attente du signal</span>
        </div>
      </div>
    </div>
    <button class="pir-predire-btn" id="predireBtn">PREDIRE</button>
    <a class="pir-back-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M19 12H5"/><path d="M 12 19l-7-7 7-7"/></svg>
      <span>Retour</span>
    </a>
  </main>
  <footer class="pir-footer-pred"><p>BNET54 Pirater 2025</p></footer>
  <div class="pir-badge-float">&#9760; BNET54</div>
  <script src="jetx.js"></script>
</body>
</html>
