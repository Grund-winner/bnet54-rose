<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#060a20" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>BNET54 - Labu Run</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="laburun.css" />
</head>
<body>
  <div class="pred-ambient"></div>
  <header class="pred-header">
    <div class="pred-header-left"><span class="pred-logo">BNET54</span><span class="pred-header-sub">Predictions</span></div>
    <div class="pred-header-right"><span class="pred-status-dot" id="statusDot"></span><span class="pred-status-text" id="statusText">Pret</span></div>
  </header>
  <main class="pred-content">
    <h1 class="pred-game-title">Labu Run</h1>
    <div class="game-section">
      <div class="game-viewport">
        <img src="assets/games/screenshots/laburun_bg.png" alt="Labu Run" class="game-viewport-bg" />
        <div class="game-viewport-overlay"></div>
        <div class="game-viewport-gradient"></div>
      </div>
    </div>
    <div class="labu-difficulty">
      <span class="labu-difficulty-label">Difficulte</span>
      <div class="labu-difficulty-btns">
        <button class="labu-diff-btn" data-diff="facile">FACILE</button>
        <button class="labu-diff-btn active" data-diff="moyen">MOYEN</button>
        <button class="labu-diff-btn" data-diff="difficile">DIFFICILE</button>
      </div>
    </div>
    <div class="labu-prediction-area" id="labuPredictionArea">
      <div class="labu-idle-msg" id="labuIdleMsg"><span>Choisissez la difficulte et cliquez PREDIRE</span></div>
      <div class="labu-analyzing-msg" id="labuAnalyzingMsg" style="display:none;">
        <svg viewBox="0 0 24 24" width="20" height="20" class="predire-spinner-svg"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-dasharray="31.4 31.4" stroke-linecap="round"/></svg>
        <span>Analyse du chemin en cours...</span>
      </div>
      <div class="labu-grid-wrapper" id="labuGridWrapper" style="display:none;">
        <div class="labu-grid" id="labuGrid"></div>
        <span class="labu-safe-count" id="labuSafeCount"></span>
      </div>
      <div class="labu-mult-result" id="labuMultResult" style="display:none;"></div>
    </div>
    <button class="predire-btn" id="predireBtn">PREDIRE</button>
    <a class="pred-back-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      <span>Retour</span>
    </a>
  </main>
  <footer class="pred-footer"><p>BNET54 2025</p></footer>
  <div class="pred-badge">BNET54</div>
  <script src="laburun.js"></script>
</body>
</html>
