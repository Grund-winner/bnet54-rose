<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#060a20" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>BNET54 - Aviator</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="aviator.css" />
</head>
<body>
  <div class="pred-ambient"></div>
  <header class="pred-header">
    <div class="pred-header-left"><span class="pred-logo">BNET54</span><span class="pred-header-sub">Predictions</span></div>
    <div class="pred-header-right"><span class="pred-status-dot" id="statusDot"></span><span class="pred-status-text" id="statusText">Pret</span></div>
  </header>
  <main class="pred-content">
    <h1 class="pred-game-title">Aviator</h1>
    <div class="game-section">
      <canvas class="crash-curve-canvas" id="crashCanvas"></canvas>
      <div class="game-viewport">
        <img src="assets/games/screenshots/aviator_bg.jpg" alt="Aviator" class="game-viewport-bg" />
        <div class="game-viewport-overlay"></div>
        <div class="game-viewport-gradient"></div>
        <div class="mult-overlay">
          <span class="mult-signal-label" id="multSignalLabel" style="display:none;">SIGNAL ACTIF</span>
          <span class="mult-value" id="multValue">--</span>
          <span class="mult-state" id="multState">En attente du signal</span>
        </div>
      </div>
    </div>
    <div class="history-row"><span class="history-label">DERNIERS SIGNAUX</span><div class="history-chips" id="historyChips"></div></div>
    <button class="predire-btn" id="predireBtn">PREDIRE</button>
    <a class="pred-back-btn" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg><span>Retour</span></a>
  </main>
  <footer class="pred-footer"><p>BNET54 2025</p></footer>
  <div class="pred-badge">BNET54</div>
  <script src="aviator.js"></script>
</body>
</html>
