opacity: 0; transform: translateY(30px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n\n/* GAME TITLE */\n.e54-game-title {\n  text-align: center;\n  font-size: 1.1rem;\n  font-weight: 600;\n  color: var(--e54-text);\n  margin-bottom: 16px;\n  letter-spacing: 0.3px;\n}\n\n/* IFRAME WRAPPER */\n.e54-iframe-wrap {\n  width: 100%;\n  height: 320px;\n  border-radius: var(--e54-radius);\n  overflow: hidden;\n  position: relative;\n  background: rgba(0,0,0,0.4);\n  border: 1px solid rgba(255,255,255,0.08);\n  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);\n  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.25s both;\n}\n\n.e54-iframe-wrap iframe {\n  width: 100%;\n  height: 650px;\n  border: none;\n  position: relative;\n  top: -40px;\n  pointer-events: auto;\n}\n\n.e54-iframe-overlay {\n  position: absolute;\n  top: 0;\n  left: 0;\n  right: 0;\n  bottom: 0;\n  background: linear-gradient(180deg, rgba(10,22,40,0.6) 0%, transparent 15%, transparent 85%, rgba(10,22,40,0.6) 100%);\n  pointer-events: none;\n  z-index: 2;\n  border-radius: var(--e54-radius);\n}\n\n/* PREDICTION CARD */\n.e54-prediction {\n  margin-top: 20px;\n  padding: 20px;\n  border-radius: var(--e54-radius);\n  backdrop-filter: blur(20px) saturate(150%);\n  -webkit-backdrop-filter: blur(20px) saturate(150%);\n  background: linear-gradient(135deg, rgba(255,215,0,0.08) 0%, rgba(255,255,255,0.04) 100%);\n  border: 1px solid rgba(255,215,0,0.15);\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.35s both;\n  box-shadow: 0 4px 24px rgba(0,0,0,0.2), 0 0 40px rgba(255,215,0,0.05);\n}\n\n.e54-prediction::before {\n  content: '';\n  position: absolute;\n  top: -50%;\n  left: -50%;\n  width: 200%;\n  height: 200%;\n  background: linear-gradient(45deg, transparent 40%, rgba(255,215,0,0.05) 50%, transparent 60%);\n  animation: e54-shimmer 4s ease-in-out infinite;\n}\n\n@keyframes e54-shimmer {\n  0% { transform: translateX(-100%) translateY(-100%); }\n  100% { transform: translateX(100%) translateY(100%); }\n}\n\n.e54-prediction-label {\n  font-size: 0.7rem;\n  font-weight: 600;\n  color: var(--e54-gold);\n  text-transform: uppercase;\n  letter-spacing: 2px;\n  margin-bottom: 8px;\n  position: relative;\n  z-index: 1;\n}\n\n.e54-prediction-value {\n  font-size: 2.8rem;\n  font-weight: 800;\n  background: linear-gradient(135deg, var(--e54-gold-light), var(--e54-gold));\n  -webkit-background-clip: text;\n  -webkit-text-fill-color: transparent;\n  background-clip: text;\n  position: relative;\n  z-index: 1;\n  line-height: 1.2;\n  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);\n}\n\n.e54-prediction-value.animate {\n  animation: e54-springBounce 0.6s cubic-bezier(0.34,1.56,0.64,1);\n}\n\n@keyframes e54-springBounce {\n  0% { transform: scale(0.5); opacity: 0; }\n  60% { transform: scale(1.15); }\n  80% { transform: scale(0.95); }\n  100% { transform: scale(1); opacity: 1; }\n}\n\n.e54-prediction-state {\n  font-size: 0.75rem;\n  color: var(--e54-text-muted);\n  margin-top: 6px;\n  position: relative;\n  z-index: 1;\n}\n\n/* BUTTONS */\n.e54-btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 8px;\n  width: 100%;\n  padding: 16px 28px;\n  border: none;\n  border-radius: 14px;\n  font-family: 'Inter', sans-serif;\n  font-size: 1rem;\n  font-weight: 700;\n  color: #0a1628;\n  background: linear-gradient(135deg, var(--e54-gold-light), var(--e54-gold), var(--e54-gold-dark));\n  background-size: 200% 200%;\n  cursor: pointer;\n  position: relative;\n  overflow: hidden;\n  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);\n  box-shadow: 0 4px 16px rgba(255,215,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);\n  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.45s both;\n  margin-top: 20px;\n}\n\n.e54-btn:active {\n  transform: scale(0.96);\n  box-shadow: 0 2px 8px rgba(255,215,0,0.15);\n}\n\n.e54-btn:hover {\n  background-position: 100% 0;\n  transform: translateY(-2px);\n  box-shadow: 0 8px 24px rgba(255,215,0,0.3);\n}\n\n.e54-btn-back {\n  width: 100%;\n  padding: 14px;\n  border: 1px solid rgba(255,255,255,0.1);\n  border-radius: 14px;\n  background: rgba(255,255,255,0.05);\n  backdrop-filter: blur(12px);\n  color: var(--e54-text-muted);\n  font-family: 'Inter', sans-serif;\n  font-size: 0.9rem;\n  font-weight: 600;\n  cursor: pointer;\n  transition: all 0.3s ease;\n  margin-top: 10px;\n  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;\n}\n\n.e54-btn-back:active { transform: scale(0.97); }\n.e54-btn-back:hover { background: rgba(255,255,255,0.1); color: #fff; }\n\n/* MINES BOARD */\n.e54-mines-container {\n  background: rgba(255,255,255,0.04);\n  backdrop-filter: blur(16px);\n  border: 1px solid rgba(255,255,255,0.08);\n  border-radius: var(--e54-radius-lg);\n  padding: 20px;\n  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;\n}\n\n.e54-mines-controls {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 16px;\n  margin-bottom: 16px;\n}\n\n.e54-mines-controls button {\n  width: 40px;\n  height: 40px;\n  border-radius: 12px;\n  border: 1px solid rgba(255,215,0,0.3);\n  background: rgba(255,215,0,0.08);\n  color: var(--e54-gold);\n  font-size: 1.2rem;\n  font-weight: 700;\n  cursor: pointer;\n  transition: all 0.2s;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n\n.e54-mines-controls button:active { transform: scale(0.9); }\n\n.e54-mines-controls span {\n  font-size: 0.85rem;\n  font-weight: 600;\n  color: var(--e54-text-muted);\n}\n\n.e54-mines-board {\n  display: grid;\n  grid-template-columns: repeat(5, 1fr);\n  gap: 8px;\n}\n\n.e54-mines-tile {\n  aspect-ratio: 1;\n  border-radius: 12px;\n  background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));\n  border: 1px solid rgba(255,255,255,0.08);\n  cursor: pointer;\n  transition: all 0.2 ar-track { background: transparent; }\n::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }\n\n/* RESPONSIVE */\n@media (max-width: 400px) {\n  .e54-main { padding: 70px 12px 20px; }\n  .e54-prediction-value { font-size: 2.2rem; }\n  .e54-iframe-wrap { height: 280px; }\n}\n\n/* REDUCED MOTION */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: 0.01ms !important;\n    transition-duration: 0.01ms !important;\n  }\n}\n\n</style>\n</head>\n<body class=\"euro54-body\">\n\n<!-- HEADER -->\n<div class=\"e54-header\">\n  <div style=\"display:flex;align-items:center;\">\n    <span class=\"e54-logo\">EURO54</span>\n    <span class=\"e54-logo-sub\">Predictions</span>\n  </div>\n  <div style=\"display:flex;align-items:center;\">\n    <span class=\"e54-status-dot live\" id=\"statusDot\"></span>\n    <span id=\"statusText\" style=\"font-size:0.7rem;color:var(--e54-text-muted);\">En direct</span>\n  </div>\n</div>\n\n<!-- MAIN -->\n<div class=\"e54-main\">\n  <div class=\"e54-game-title\">Astronaut</div>\n  \n  <div class=\"e54-iframe-wrap\">\n    <iframe id=\"myIframe\" src=\"https://100hp.app/astronaut_grm/vgs/?b=b6705c907a83ad9b76c1ba570bc28eab956e22df71dfca96fd5dc5d06f84cfaf33f4a72d51a600d23cd210d72b621c13b35fa9c8d288c8ae497773d27aed4445711cad084dfd8dbb51b45c8adf6a497ce1c304c39571fbf8c95d191526f234385e1e1818ecfe8fb588606790619e02bfcf5e700ac2acf2cf48a3ad4d99c89e2e44a43518f2856dd102774577fbe01d0034b3cd60ad0b57d63fca90b1b7e6f6d3b4b8785994759e909b28532e095fd60f7e209688763ba4ffb2.9f8bf20bd7133274cda5ed14d6aae856.077dee8d-c923-4c02-9bee-757573662e69&amp;language=en&amp;pid=1win&amp;pik=01961b0c-84c8-7d20-a319-48c736b3b49d\" scrolling=\"no\"></iframe>\n    <div class=\"e54-iframe-overlay\"></div>\n  </div>\n  \n  <div class=\"e54-prediction\">\n    <div class=\"e54-prediction-label\">Prochaine Prédiction</div>\n    <div class=\"e54-prediction-value animate\" id=\"multiplier\">x1.90</div>\n    <div class=\"e54-prediction-state\" id=\"predState\">Prédiction active</div>\n  </div>\n  \n  <button class=\"e54-btn-back\" onclick=\"history.back()\">← Retour</button>\n  \n  <div class=\"e54-footer\">EURO54 © 2025</div>\n</div>\n\n<div class=\"e54-badge\">EURO54</div>\n\n<script>\n\nconst multiplierEl = document.getElementById('multiplier');\nconst statusDot = document.getElementById('statusDot');\nconst statusText = document.getElementById('statusText');\nconst predState = document.getElementById('predState');\n\nfunction setStatus(state) {\n  statusDot.className = 'e54-status-dot ' + state;\n  if (state === 'live') statusText.textContent = 'En direct';\n  else if (state === 'wait') statusText.textContent = 'En attente';\n  else if (state === 'error') statusText.textContent = 'Erreur';\n  else statusText.textContent = 'Chargement...';\n}\n\nfunction showPrediction(val) {\n  multiplierEl.textContent = 'x' + val;\n  multiplierEl.classList.remove('animate');\n  void multiplierEl.offsetWidth;\n  multiplierEl.classList.add('animate');\n  predState.textContent = 'Prédiction active';\n  setStatus('live');\n}\n\nconst apiURL = \"https://crash-gateway-grm-cr.100hp.app/state\";\nconst historyURL = \"https://crash-gateway-grm-cr.100hp.app/history\";\nconst headers = {\n  'customer-id': '077dee8d-c923-4c02-9bee-757573662e69',\n  'session-id': '908ae0ec-b269-492e-90af-3cec56f163bb',\n  'accept': 'application/json'\n};\n\nlet historyData = [];\n\nfunction calcAvg(d, w) {\n  if (d.length < w) return d[d.length - 1] || 1.5;\n  return d.slice(-w).reduce((a, b) => a + b, 0) / w;\n}\n\nfunction calcEWMA(d, a = 0.3) {\n  if (!d.length) return 1.5;\n  let e = d[0];\n  for (let i = 1; i < d.length; i++) e = a * d[i] + (1 - a) * e;\n  return e;\n}\n\nfunction calcVol(d) {\n  if (d.length < 2) return 0;\n  const m = d.reduce((a, b) => a + b, 0) / d.length;\n  return Math.sqrt(d.reduce((s, v) => s + (v - m) ** 2, 0) / d.length);\n}\n\nfunction detectTrend(d, w = 10) {\n  if (d.length < w) return 0;\n  const r = d.slice(-w);\n  let inc = 0;\n  for (let i = 1; i < r.length; i++) if (r[i] > r[i-1]) inc++;\n  return (inc / (r.length - 1)) - 0.5;\n}\n\nfunction calcMomentum(d, p = 5) {\n  if (d.length < p + 1) return 0;\n  return (d[d.length-1] - d[d.length-p-1]) / d[d.length-p-1];\n}\n\nfunction ensemblePrediction(history) {\n  if (history.length < 5) return 1.2 + Math.random() * 1.3;\n  const vol = calcVol(history.slice(-20));\n  const alpha = Math.max(0.1, Math.min(0.5, vol / 2));\n  const ewma = calcEWMA(history, alpha);\n  const trend = calcAvg(history, 10) * (1 + detectTrend(history) * 0.2);\n  const mom = history[history.length-1] * (1 + calcMomentum(history) * 0.3);\n  const mean = history.reduce((a, b) => a + b, 0) / history.length;\n  const last = history[history.length - 1];\n  const meanRev = last + (mean - last) * 0.25;\n  let val = ewma * 0.35 + trend * 0.20 + mom * 0.20 + meanRev * 0.25;\n  return Math.max(1.01, Math.min(val, 8));\n}\n\nasync function fetchPrediction() {\n  try {\n    const res = await fetch(historyURL, { headers });\n    const data = await res.json();\n    if (!Array.isArray(data) || !data.length) return \"1.50\";\n    const coef = data[0]?.coef ?? data[0]?.crash ?? data[0]?.value ?? data[0]?.topCoefficient;\n    if (!coef) return \"1.50\";\n    historyData.push(Number(coef));\n    const next = ensemblePrediction(historyData);\n    return next.toFixed(2);\n  } catch (e) {\n    console.error(\"Prediction error:\", e);\n    return (1.2 + Math.random() * 1.5).toFixed(2);\n  }\n}\n\nfunction extractGameStage(d) {\n  // Try common nested paths\n  if (!d || typeof d !== 'object') return { stage: 'unknown', roundId: null, coef: null };\n  \n  const paths = [\n    d.currentState,\n    d.game?.state,\n    d.game?.gameState,\n    d.game?.status,\n    d.game?.stage,\n    d.state,\n    d.status,\n    d.gameState,\n    d.stage,\n    d.data?.game?.state,\n    d.data?.gameState,\n    d.data?.state,\n    d.data?.status,\n  ];\n  \n  let stage = null;\n  for (const p of paths) {\n    if (p === undefined || p === null) continue;\n    if (typeof p === 'string') { stage = p.toLowerCase(); break; }\n    if (typeof p === 'number') { stage = p === 1 ? 'started' : p === 2 ? 'finished' : 'waiting'; break; }\n    if (typeof p === 'boolean') { stage = p ? 'started' : 'waiting'; break; }\n  }\n  \n  const rid = d.roundConfig?.id ?? d.game?.id ?? d.game?.roundId ?? d.roundId ?? d.id ?? d.data?.game?.id ?? d.data?.roundId;\n  const coef = d.currentCoefficients?.[0] ?? d.stopCoefficients?.[0] ?? d.game?.coefficient ?? d.game?.crashPoint ?? d.game?.multiplier ?? d.coefficient;\n  \n  return { stage: stage || 'unknown', roundId: rid || null, coef: coef || null };\n}\n\nlet lastStage = null;\nlet lastRoundId = null;\nlet predictedForRound = null;\n\nfunction classifyStage(stage) {\n  if (!stage) return 'unknown';\n  if (['started','running','flying','play','playing','live','in_game','inprogress','active','in-game'].includes(stage)) return 'running';\n  if (['crashed','crash','ended','finished','completed','gameover','game_over','dead','end'].includes(stage)) return 'crashed';\n  if (['waiting','betting','idle','ready','countdown','pending','prepare','preparing','new'].includes(stage)) return 'waiting';\n  return 'unknown';\n}\n\nasync function poll() {\n  try {\n    const resp = await fetch(apiURL, { method: 'GET', headers });\n    if (!resp.ok) throw new Error('API ' + resp.status);\n    const data = await resp.json();\n    \n    const { stage, roundId, coef } = extractGameStage(data);\n    const classified = classifyStage(stage);\n    \n    // Detect round end (crash) by two methods:\n    // Method 1: State went from running to non-running (flying -> waiting/crashed)\n    const stateCrashed = lastStage === 'running' && classified !== 'running';\n    // Method 2: roundId changed while game was running (API skipped waiting state)\n    const roundSkipped = lastStage === 'running' && roundId && lastRoundId && roundId !== lastRoundId;\n    \n    if (stateCrashed || roundSkipped) {\n      // Round ended -> reset so we can predict for the next one\n      predictedForRound = null;\n      console.log('[poll] CRASH DETECTED (state=' + classified + ', round=' + roundId + ')');\n    }\n    \n    // Predict if no active prediction exists\n    if (!predictedForRound) {\n      setStatus('wait');\n      predState.textContent = 'Calcul en cours...';\n      const val = await fetchPrediction();\n      showPrediction(val);\n      predictedForRound = roundId || Date.now();\n      console.log('[poll] Prediction: x' + val + ' for round ' + predictedForRound);\n    } else {\n      // Already have a prediction -> just update status display\n      if (classified === 'running') {\n        setStatus('live');\n      } else {\n        setStatus('wait');\n      }\n    }\n    \n    lastStage = classified;\n    lastRoundId = roundId;\n    \n  } catch (e) {\n    setStatus('error');\n    statusText.textContent = 'Reconnexion...';\n    console.error('[poll] error:', e);\n  }\n  \n  setTimeout(poll, 500);\n}\n\nsetStatus('wait');\npoll();\n</script>\n\n\n<script>\n/* ===== ZOOM BLOCK - ULTRA ===== */\n(function(){\n  var lt=0;\n  document.addEventListener('touchstart',function(e){if(e.touches.length>1)e.preventDefault()},{passive:false});\n  document.addEventListener('touchmove',function(e){if(e.touches.length>1)e.preventDefault()},{passive:false});\n  document.addEventListener('touchend',function(e){var n=Date.now();if(n-lt<=300)e.preventDefault();lt=n},{passive:false});\n  document.addEventListener('gesturestart',function(e){e.preventDefault()},{passive:false});\n  document.addEventListener('gesturechange',function(e){e.preventDefault()},{passive:false});\n  document.addEventListener('gestureend',function(e){e.preventDefault()},{passive:false});\n  document.addEventListener('wheel',function(e){if(e.ctrlKey||e.metaKey)e.preventDefault()},{passive:false});\n  document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&(e.key==='+'||e.key==='-'||e.key==='='||e.key==='0'))e.preventDefault()});\n  window.addEventListener('resize',function(){setTimeout(function(){var vp=document.querySelector('meta[name=\"viewport\"]');if(vp)vp.setAttribute('content','width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover')},100)});\n  setTimeout(function(){var vp=document.querySelector('meta[name=\"viewport\"]');if(vp)vp.setAttribute('content','width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover')},500);\n})();\n</script>\n\n<script src=\"../../protect.js\"></script>\n\n</body></html>"
