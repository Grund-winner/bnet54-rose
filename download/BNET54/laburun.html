<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0b1a3a">
  <title>BNET54 - Labu Run</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="laburun.css">
</head>
<body>
  <div class="game-bg"></div>

  <!-- Atmospheric particles -->
  <div class="atmo-glow ag-1"></div>
  <div class="atmo-glow ag-2"></div>

  <div class="game-container">
    <!-- Logo -->
    <div class="logo-wrap">
      <img src="assets/laburun/logo.png" alt="Labu Run" class="game-logo">
    </div>

    <!-- Mode Selector -->
    <div class="mode-selector">
      <button class="mode-btn active" data-mode="facile">FACILE</button>
      <button class="mode-btn" data-mode="moyen">MOYEN</button>
      <button class="mode-btn" data-mode="difficile">DIFFICILE</button>
      <button class="mode-btn" data-mode="hardcore">HARDCORE</button>
    </div>

    <!-- Game Area - FULL PAGE STYLE -->
    <div class="game-area" id="gameArea">
      <!-- Starting platform -->
      <div class="platform start-platform" id="startPlatform">
        <div class="platform-ring"></div>
        <div class="platform-core"></div>
      </div>

      <!-- Landing platform -->
      <div class="platform landing-platform" id="landingPlatform">
        <div class="platform-ring"></div>
        <div class="platform-core"></div>
      </div>

      <!-- Character (single composite image) -->
      <div class="character" id="character">
        <img src="assets/laburun/character_01.png" alt="" id="charImg" draggable="false">
      </div>

      <!-- Crash effect -->
      <div class="crash-layer" id="crashLayer" style="display:none">
        <img id="crashImg" src="" alt="" draggable="false">
      </div>

      <!-- Coefficient display using game number sprites -->
      <div class="coeff-display" id="coeffDisplay" style="display:none">
        <div class="coeff-inner" id="coeffInner"></div>
      </div>

      <!-- Loading -->
      <div class="loading-layer" id="loadingLayer" style="display:none">
        <div class="loading-spinner"></div>
        <span>Analyse en cours...</span>
      </div>
    </div>

    <!-- PREDIRE Button -->
    <button class="predire-btn" id="predireBtn">PREDIRE</button>

    <!-- Back Button -->
    <button class="back-btn" id="backBtn">
      <span>&#8592;</span>
      <span>Retour</span>
    </button>
  </div>

  <script src="laburun.js"></script>
</body>
</html>
